services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://o2wedding.ru}
    container_name: o2wedding-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    expose:
      - "5000"
    volumes:
      - ./data:/app/data

  nginx:
    image: nginx:1.27-alpine
    container_name: o2wedding-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/o2wedding.ru.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
